<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ananya Varma Mudunuri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --black:#080807;
  --off-white:#f2efe8;
  --gold:#b8955a;
  --gold-light:#d4b483;
  --muted:rgba(242,239,232,.4);
  --muted2:rgba(242,239,232,.15);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Outfit',sans-serif;
}
body{
  background:var(--black);color:var(--off-white);
  font-family:var(--sans);font-weight:300;
  overflow-x:hidden;cursor:none;min-height:100vh;
}
.cursor{
  width:8px;height:8px;background:var(--gold);border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;
  transition:width .18s,height .18s,background .18s;
}
.cursor.grow{width:36px;height:36px;background:transparent;border:1px solid var(--gold-light)}
.cursor-ring{
  width:34px;height:34px;border:1px solid rgba(184,149,90,.25);border-radius:50%;
  position:fixed;top:0;left:0;pointer-events:none;z-index:9998;
}
/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;justify-content:space-between;align-items:center;
  padding:2rem 5vw;
}
.nav-logo{
  font-family:var(--serif);font-size:1.05rem;font-weight:300;font-style:italic;
  letter-spacing:.04em;color:var(--off-white);text-decoration:none;opacity:.8;transition:opacity .2s;
}
.nav-logo:hover{opacity:1}
.nav-links{display:flex;gap:3rem;align-items:center}
.nav-links a{
  font-family:var(--sans);font-size:.66rem;font-weight:400;
  letter-spacing:.18em;text-transform:uppercase;
  color:rgba(242,239,232,.5);text-decoration:none;
  position:relative;transition:color .25s;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;
  background:var(--gold);transition:width .3s;
}
.nav-links a:hover{color:var(--off-white)}
.nav-links a:hover::after{width:100%}
/* HERO */
#hero{
  position:relative;width:100vw;height:100vh;overflow:hidden;
  display:flex;align-items:flex-end;
}
/* grain overlay */
#hero::before{
  content:'';position:absolute;inset:0;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.45;pointer-events:none;
}
.hero-photo{
  position:absolute;right:0;bottom:0;width:52%;height:94%;z-index:1;overflow:hidden;
}
.hero-photo img{
  width:100%;height:100%;object-fit:cover;object-position:top center;
  filter:grayscale(20%) contrast(1.08) brightness(.9);
  display:block;
}
/* vignette on photo */
.hero-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right,var(--black) 0%,transparent 30%),
             linear-gradient(to top,var(--black) 0%,transparent 25%);
  z-index:2;
}
/* giant type */
.hero-type{
  position:absolute;inset:0;z-index:2;
  padding:5vh 5vw 0;
  display:flex;flex-direction:column;justify-content:flex-start;
  line-height:.84;pointer-events:none;
}
.ht-line{
  font-family:var(--serif);font-weight:300;color:var(--off-white);
  display:block;
  opacity:0;transform:translateY(55px);
  transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1);
}
.ht-hi  {font-size:clamp(4.5rem,11vw,11rem);font-style:italic;color:rgba(242,239,232,.7)}
.ht-im  {font-size:clamp(3.5rem,9vw,9rem);font-weight:600;color:rgba(242,239,232,.3);line-height:.75}
.ht-name{font-size:clamp(6rem,17vw,17rem);font-weight:600;letter-spacing:-.02em}
/* bottom */
.hero-bottom{
  position:absolute;bottom:3rem;left:5vw;right:5vw;z-index:3;
  display:flex;justify-content:space-between;align-items:flex-end;
}
.hero-tag{
  max-width:400px;font-size:clamp(.8rem,1vw,.95rem);
  color:rgba(242,239,232,.6);line-height:1.8;font-family:var(--sans);font-weight:300;
}
.hero-tag em{font-family:var(--serif);font-style:italic;color:var(--gold-light);font-size:1.1em}
.hero-social{display:flex;flex-direction:column;align-items:flex-end;gap:.5rem}
.hero-social a{
  font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(242,239,232,.5);text-decoration:none;transition:color .2s,letter-spacing .2s;
}
.hero-social a:hover{color:var(--gold);letter-spacing:.2em}
/* gold line accent */
.gold-rule{
  position:absolute;left:5vw;top:50%;width:1px;height:30vh;
  background:linear-gradient(to bottom,transparent,var(--gold),transparent);
  z-index:3;opacity:.4;
}
/* scroll hint */
.scroll-hint{
  position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);
  z-index:4;display:flex;flex-direction:column;align-items:center;gap:.4rem;
  color:rgba(242,239,232,.25);animation:bob 2.5s ease-in-out infinite;
}
.scroll-hint span{font-size:.55rem;letter-spacing:.18em;text-transform:uppercase}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
/* role ticker */
.role-ticker{
  position:absolute;left:5vw;bottom:8.5rem;z-index:3;
  display:flex;align-items:center;gap:.8rem;
}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}
.ticker-text{
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(242,239,232,.45);
  overflow:hidden;height:1.2em;position:relative;
}
.ticker-inner{
  display:flex;flex-direction:column;
  animation:tickUp 8s infinite;
}
.ticker-inner span{display:block;line-height:1.2em;white-space:nowrap}
@keyframes tickUp{
  0%,18%{transform:translateY(0)}
  25%,43%{transform:translateY(-1.2em)}
  50%,68%{transform:translateY(-2.4em)}
  75%,93%{transform:translateY(-3.6em)}
  100%{transform:translateY(-4.8em)}
}
/* PAGE TRANSITION */
.page-veil{
  position:fixed;inset:0;z-index:900;
  background:var(--black);
  pointer-events:none;
  opacity:0;transition:opacity .4s ease;
}
.page-veil.show{opacity:1;pointer-events:all}
/* FOOTER */
footer{border-top:1px solid var(--muted2);padding:2rem 5vw;display:flex;justify-content:space-between;align-items:center}
footer p{font-size:.62rem;color:rgba(242,239,232,.28);letter-spacing:.1em;text-transform:uppercase}
.foot-links{display:flex;gap:2rem}
.foot-links a{font-size:.62rem;color:rgba(242,239,232,.3);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.foot-links a:hover{color:var(--gold)}
/* RESPONSIVE */
@media(max-width:860px){
  .hero-photo{width:60%;height:72%}
  .ht-name{font-size:clamp(5rem,18vw,9rem)}
  .hero-bottom{flex-direction:column;align-items:flex-start;gap:1.5rem;bottom:2rem}
  .hero-social{flex-direction:row;flex-wrap:wrap;gap:1.2rem}
  nav{padding:1.4rem 1.5rem}
}
@media(max-width:560px){
  .hero-photo{width:100%;height:55%;bottom:0}
  .hero-photo::after{background:linear-gradient(to top,var(--black) 0%,transparent 40%)}
}
</style>
</head>

document.querySelectorAll('a[href]').forEach(a=>{
  const href=a.getAttribute('href');
  if(!href.startsWith('http')&&!href.startsWith('mailto')&&!href.startsWith('#')){
    a.addEventListener('click',e=>{
      e.preventDefault();
      const veil=document.getElementById('veil');
      veil.classList.add('show');
      setTimeout(()=>window.location.href=href,420);
    });
  }
});
window.addEventListener('pageshow',()=>{
  document.getElementById('veil').classList.remove('show');
});
</script>
</body>
</html>
